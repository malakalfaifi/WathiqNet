{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content_noauth %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-lg" style="width: 450px; max-width: 95%;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-shield-plus text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-3">Create Account</h2>
                <p class="text-muted">Join WathiqNet as a viewer</p>
            </div>
            
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" name="username" required 
                               minlength="3" maxlength="80" pattern="[a-zA-Z0-9_]+" 
                               title="Only letters, numbers, and underscores">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control" id="password" name="password" required 
                               minlength="8" title="At least 8 characters">
                    </div>
                    <div class="form-text">At least 8 characters</div>
                </div>
                
                <div class="mb-4">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-person-plus me-2"></i>Register
                </button>
            </form>
            
            <hr class="my-4">
            
            <p class="text-center mb-0">
                Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
